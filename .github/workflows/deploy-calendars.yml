name: Deploy Calendars in GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "*.ics"
      - "index.html"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare files
        run: |
          mkdir _site
          cp index.html _site/
          cp *.ics _site/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        uses: actions/deploy-pages@v4
