name: Build and Deploy Calendars

on:
  schedule:
    - cron: "0 3/6 * * *"   # cada hora (ejemplo)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt

      - name: Generar calendarios
        run: |
          python genera_bisbe_calendar.py
          python genera_faf_calendar.py

      - name: Commit cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add site/*.ics
          git commit -m "Actualizar calendarios" || echo "Sin cambios"
          git push

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Check if site changed
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep '^site/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Pages
        if: steps.changes.outputs.changed == 'true'
        uses: actions/configure-pages@v4

      - name: Subir artifact
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
